version: "3.8"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: pgvector_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: recordoc
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: recordoc_app
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:1234@db:5432/recordoc
    ports:
      - "8000:8000"

volumes:
  pgdata: